<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robin Maben — Terminal CV</title>
  <meta name="description" content="Interactive terminal-style CV for Robin Maben, Software Engineer at Microsoft.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="terminal">
    <div id="top-bar">
      <span id="terminal-title">robin@web:~</span>
      <span id="theme-indicator">dark</span>
      <span id="help-hint" title="Type 'help' for commands">?</span>
    </div>
    <div id="output"></div>
    <div id="input-line">
      <span class="prompt">robin@web:~$&nbsp;</span>
      <input type="text" id="cmd-input" autofocus autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Terminal input">
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
